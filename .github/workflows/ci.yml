name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: corepack enable pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm test
